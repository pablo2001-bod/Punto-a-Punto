{% extends "plantillaprincipal.html" %}
{% block titulo %}Editar Seguro | Punto a Punto{% endblock %}

{% block contenido %}
<main class="main" style="padding-top: 105px;">
<section class="section">
<div class="container">

<div class="row justify-content-center">
    <div class="col-lg-9">
        <div class="card shadow-sm">
            <div class="card-header bg-warning text-dark">
                <h4 class="mb-0"><i class="bi bi-pencil-square"></i> Editar seguro</h4>
            </div>
            <div class="card-body p-4">
                <!-- Se asigna novalidate para activar las validaciones de jQuery -->
                <form id="formEditarSeguro" action="/seguros/actualizarSeguro/{{ seguro.id_seguro }}/" method="post" novalidate>
                    {% csrf_token %}
                    <div class="row g-3">
                        
                        <!-- Campo NOMBRE -->
                        <div class="col-md-6">
                            <label class="form-label font-weight-bold">Nombre <span class="text-danger">*</span></label>
                            <input type="text" 
                                   name="nombre" 
                                   class="form-control" 
                                   value="{{ seguro.nombre }}" 
                                   placeholder="Ej: Cobertura Total" 
                                   maxlength="50">
                        </div>

                        <!-- Campo COBERTURA (%) -->
                        <div class="col-md-3">
                            <label class="form-label font-weight-bold">Cobertura (%) <span class="text-danger">*</span></label>
                            <input type="number" 
                                   name="porcentaje_cobertura"
                                   step="0.01" 
                                   min="0" 
                                   max="100"
                                   class="form-control" 
                                   value="{{ seguro.porcentaje_cobertura }}" 
                                   placeholder="Ej: 80.00">
                        </div>

                        <!-- Campo COSTO ($) -->
                        <div class="col-md-3">
                            <label class="form-label font-weight-bold">Costo ($) <span class="text-danger">*</span></label>
                            <input type="number" 
                                   name="costo" 
                                   step="0.01"
                                   min="0" 
                                   class="form-control" 
                                   value="{{ seguro.costo }}" 
                                   placeholder="Ej: 15.50">
                        </div>

                        <!-- Campo DESCRIPCIÓN -->
                        <div class="col-12">
                            <label class="form-label font-weight-bold">Descripción <span class="text-danger">*</span></label>
                            <textarea name="descripcion" 
                                      rows="4"
                                      class="form-control" 
                                      placeholder="Describa brevemente la cobertura que ofrece este seguro...">{{ seguro.descripcion }}</textarea>
                        </div>

                        <!-- Campo ACTIVO -->
                        <div class="col-12">
                            <div class="form-check">
                                <input type="checkbox" 
                                       name="activo"
                                       class="form-check-input" 
                                       id="activo" 
                                       {% if seguro.activo %}checked{% endif %}>
                                <label class="form-check-label font-weight-bold" for="activo">
                                    Seguro activo
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- Botones de Acción -->
                    <div class="mt-4 d-flex gap-2">
                        <button type="submit" class="btn btn-warning">
                            <i class="bi bi-arrow-repeat"></i> Actualizar
                        </button>
                        <a href="/seguros/listadoSeguro/" class="btn btn-secondary">
                            Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

</div>
</section>
</main>

<!-- SCRIPT DE VALIDACIÓN EN ROJO -->
<script>
$(document).ready(function() {

    //  Solo letras y espacios para el Nombre
    $.validator.addMethod("soloTexto", function(value, element) {
        return this.optional(element) || /^[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+$/.test(value);
    }, "El nombre solo puede contener letras.");

    // Configuración validador para Editar Seguro
    $("#formEditarSeguro").validate({
        rules: {
            nombre: {
                required: true,
                minlength: 3,
                soloTexto: true
            },
            porcentaje_cobertura: {
                required: true,
                number: true,
                min: 0.1,
                max: 100
            },
            costo: {
                required: true,
                number: true,
                min: 0
            },
            descripcion: {
                required: true,
                minlength: 10
            }
        },
        messages: {
            nombre: {
                required: "El nombre del seguro es obligatorio.",
                minlength: "Debe tener al menos 3 caracteres."
            },
            porcentaje_cobertura: {
                required: "Ingrese el porcentaje de cobertura.",
                number: "Ingrese un valor numérico válido.",
                min: "La cobertura debe ser mayor a 0%.",
                max: "La cobertura no puede superar el 100%."
            },
            costo: {
                required: "Ingrese el costo del seguro.",
                number: "Ingrese un valor numérico válido.",
                min: "El costo no puede ser negativo."
            },
            descripcion: {
                required: "La descripción es obligatoria.",
                minlength: "Escriba una descripción de al menos 10 caracteres."
            }
        },

        // resaltado visual en ROJO
        errorElement: 'span',
        errorPlacement: function (error, element) {
            error.addClass('invalid-feedback font-weight-bold');
            element.closest('.col-md-6, .col-md-3, .col-12').append(error);
        },
        highlight: function (element) {
            $(element).addClass('is-invalid').removeClass('is-valid');
        },
        unhighlight: function (element) {
            $(element).removeClass('is-invalid').addClass('is-valid');
        }
    });

});
</script>
{% endblock %}
