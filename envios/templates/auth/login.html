<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión | Punto a Punto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-primary bg-opacity-10 d-flex align-items-center justify-content-center vh-100">
    <div class="card shadow-lg p-4 border-0 rounded-4 bg-white" style="width: 100%; max-width: 420px;">
        <div class="text-center mb-4">
            <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center shadow" style="width: 65px; height: 65px;">
                <i class="bi bi-box-seam fs-3"></i>
            </div>
            <h3 class="text-primary mt-3 fw-bold">Punto a Punto</h3>
            <p class="text-muted small">Inicia sesión para continuar</p>
        </div>

        <!-- Credenciales de Superusuario Anotadas -->
        <div class="alert alert-primary py-2 px-3 small border-0 bg-primary-subtle text-primary-emphasis mb-3">
            <i class="bi bi-info-circle-fill me-1"></i> <b>Admin por defecto:</b><br>
            Usuario: <b>admin</b> | Contraseña: <b>admin</b>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger py-2 small border-0 shadow-sm">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold text-secondary small">Usuario</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0 text-primary"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" class="form-control bg-light border-start-0" placeholder="Ingresa tu usuario" required>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold text-secondary small">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0 text-primary"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control bg-light border-start-0" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold shadow-sm">
                <i class="bi bi-box-arrow-in-right me-1"></i> Ingresar
            </button>
        </form>

        <div class="text-center mt-4 pt-2 border-top">
            <small class="text-muted">¿No tienes una cuenta? <a href="/registro/" class="text-primary text-decoration-none fw-semibold">Regístrate aquí</a></small>
        </div>
    </div>
</body>
</html>
