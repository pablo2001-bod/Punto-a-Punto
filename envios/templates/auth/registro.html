<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Cuenta | Punto a Punto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-primary bg-opacity-10 d-flex align-items-center justify-content-center py-5">
    <div class="card shadow-lg p-4 border-0 rounded-4 bg-white" style="width: 100%; max-width: 500px;">
        <div class="text-center mb-3">
            <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center shadow" style="width: 55px; height: 55px;">
                <i class="bi bi-person-plus fs-4"></i>
            </div>
            <h3 class="text-primary mt-2 fw-bold">Crear Cuenta</h3>
            <p class="text-muted small">Regístrate para gestionar tus envíos y realizar seguimiento</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger py-2 small border-0 shadow-sm">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-6 mb-2">
                    <label class="form-label fw-semibold text-secondary small">Nombres</label>
                    <input type="text" name="nombres" class="form-control bg-light form-control-sm" placeholder="Tus nombres" required>
                </div>
                <div class="col-md-6 mb-2">
                    <label class="form-label fw-semibold text-secondary small">Apellidos</label>
                    <input type="text" name="apellidos" class="form-control bg-light form-control-sm" placeholder="Tus apellidos" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-2">
                    <label class="form-label fw-semibold text-secondary small">Cédula</label>
                    <input type="text" name="cedula" class="form-control bg-light form-control-sm" placeholder="Número de cédula" required>
                </div>
                <div class="col-md-6 mb-2">
                    <label class="form-label fw-semibold text-secondary small">Teléfono</label>
                    <input type="text" name="telefono" class="form-control bg-light form-control-sm" placeholder="Teléfono de contacto" required>
                </div>
            </div>

            <div class="mb-2">
                <label class="form-label fw-semibold text-secondary small">Dirección</label>
                <input type="text" name="direccion" class="form-control bg-light form-control-sm" placeholder="Dirección domiciliaria" required>
            </div>

            <div class="mb-2">
                <label class="form-label fw-semibold text-secondary small">Nombre de Usuario</label>
                <input type="text" name="username" class="form-control bg-light form-control-sm" placeholder="Nombre para iniciar sesión" required>
            </div>

            <div class="mb-2">
                <label class="form-label fw-semibold text-secondary small">Correo electrónico</label>
                <input type="email" name="email" class="form-control bg-light form-control-sm" placeholder="correo@ejemplo.com" required>
            </div>

            <div class="row">
                <div class="col-md-6 mb-2">
                    <label class="form-label fw-semibold text-secondary small">Contraseña</label>
                    <input type="password" name="password1" class="form-control bg-light form-control-sm" placeholder="••••••••" required>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label fw-semibold text-secondary small">Confirmar</label>
                    <input type="password" name="password2" class="form-control bg-light form-control-sm" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold shadow-sm mt-2">
                <i class="bi bi-check-circle me-1"></i> Registrarse
            </button>
        </form>

        <div class="text-center mt-3 pt-2 border-top">
            <small class="text-muted">¿Ya tienes cuenta? <a href="/login/" class="text-primary text-decoration-none fw-semibold">Inicia sesión</a></small>
        </div>
    </div>
</body>
</html>
