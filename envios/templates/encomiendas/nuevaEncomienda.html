{% extends "plantillaprincipal.html" %}
{% block titulo %}Nueva Encomienda | Punto a Punto{% endblock %}

{% block contenido %}
<main class="main" style="padding-top: 105px;">
<section class="section">
<div class="container">

<div class="row justify-content-center">
    <div class="col-lg-10">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="bi bi-box-seam"></i> Registrar nueva encomienda</h4>
            </div>
            <div class="card-body p-4">
                <form id="formEncomienda" action="/encomiendas/guardarEncomienda/" method="post">
                    {% csrf_token %}
                    
                    <h5 class="text-secondary border-bottom pb-2 mb-3">Datos de Origen y Destino</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-md-4">
                            <label class="form-label font-weight-bold">Cliente Remitente <span class="text-danger">*</span></label>
                            <select name="cliente" class="form-select" required>
                                <option value="">Seleccione...</option>
                                {% for c in clientes %}
                                <option value="{{ c.id_cliente }}">{{ c.apellidos }} {{ c.nombres }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label font-weight-bold">Oficina Origen <span class="text-danger">*</span></label>
                            <select id="oficina_origen" name="oficina_origen" class="form-select" required>
                                <option value="">Seleccione...</option>
                                {% for o in oficinas %}
                                <option value="{{ o.id_oficina }}">{{ o.ciudad }} - {{ o.nombre }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label font-weight-bold">Oficina Destino <span class="text-danger">*</span></label>
                            <select id="oficina_destino" name="oficina_destino" class="form-select" required>
                                <option value="">Seleccione...</option>
                                {% for o in oficinas %}
                                <option value="{{ o.id_oficina }}">{{ o.ciudad }} - {{ o.nombre }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <h5 class="text-secondary border-bottom pb-2 mb-3">Datos del Destinatario</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-md-4">
                            <label class="form-label font-weight-bold">Nombre Completo <span class="text-danger">*</span></label>
                            <input type="text" name="nombre_destinatario" id="nombre_destinatario" class="form-control" placeholder="Ej: Juan Pérez" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label font-weight-bold">Cédula Ecuatoriana <span class="text-danger">*</span></label>
                            <input type="text" name="cedula_destinatario" id="cedula_destinatario" class="form-control" maxlength="10" placeholder="Ej: 1712345678" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label font-weight-bold">Teléfono (Celular) <span class="text-danger">*</span></label>
                            <input type="text" name="telefono_destinatario" id="telefono_destinatario" class="form-control" maxlength="10" placeholder="Ej: 0991234567" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label font-weight-bold">Email</label>
                            <input type="email" name="email_destinatario" class="form-control" placeholder="correo@ejemplo.com">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label font-weight-bold">Dirección de Entrega <span class="text-danger">*</span></label>
                            <input type="text" name="direccion_destino" id="direccion_destino" class="form-control" placeholder="Ej: Av. Amazonas y Corella N34-12" required>
                        </div>
                    </div>

                    <h5 class="text-secondary border-bottom pb-2 mb-3">Detalles del Envío</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-md-12">
                            <label class="form-label font-weight-bold">Descripción del paquete <span class="text-danger">*</span></label>
                            <textarea name="descripcion" class="form-control" rows="2" placeholder="Describa brevemente el contenido..." required></textarea>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label font-weight-bold">Transporte Asignado</label>
                            <select id="transporte" name="transporte" class="form-select">
                                <option value="">Sin asignar (Opcional)</option>
                                {% for t in transportes %}
                                <option value="{{ t.id_transporte }}" data-capacidad="{{ t.capacidad_kg }}">{{ t.placa }} (Capacidad: {{ t.capacidad_kg }}kg)</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label font-weight-bold">Seguro</label>
                            <select name="seguro" class="form-select">
                                <option value="">Sin seguro (Opcional)</option>
                                {% for s in seguros %}
                                <option value="{{ s.id_seguro }}">{{ s.nombre }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label font-weight-bold">Peso (kg) <span class="text-danger">*</span></label>
                            <input type="number" id="peso_kg" name="peso_kg" step="0.01" min="0.1" max="500" class="form-control" placeholder="Máx. 500 kg" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label font-weight-bold">Valor Declarado ($) <span class="text-danger">*</span></label>
                            <input type="number" name="valor_declarado" step="0.01" min="0" max="10000" class="form-control" placeholder="Máx. $10,000.00" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label font-weight-bold">Costo de Envío ($) <span class="text-danger">*</span></label>
                            <input type="number" name="costo_envio" step="0.01" min="0" max="500" class="form-control" placeholder="Máx. $500.00" required>
                        </div>
                    </div>

                    <div class="mt-4 d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save"></i> Guardar Encomienda
                        </button>
                        <a href="/encomiendas/listadoEncomienda/" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

</div>
</section>
</main>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.min.js"></script>

<script>
$(document).ready(function() {
    // 1. Validación estricta de Cédula Ecuatoriana (Módulo 10)
    $.validator.addMethod("cedulaEcuador", function(value, element) {
        if (this.optional(element)) return true;
        if (value.length !== 10 || !/^\d{10}$/.test(value)) return false;

        var provincia = parseInt(value.substring(0, 2), 10);
        if ((provincia < 1 || provincia > 24) && provincia !== 30) return false;

        var tercerDigito = parseInt(value[2], 10);
        if (tercerDigito >= 6) return false;

        var digitoVerificador = parseInt(value[9], 10);
        var suma = 0;
        var digito = 0;

        for (var i = 0; i < 9; i++) {
            digito = parseInt(value[i], 10);
            if (i % 2 === 0) {
                digito *= 2;
                if (digito > 9) digito -= 9;
            }
            suma += digito;
        }

        var resultado = suma % 10 === 0 ? 0 : 10 - (suma % 10);
        return resultado === digitoVerificador;
    }, "Por favor, ingrese un número de cédula ecuatoriano válido.");

    // 2. Validación de Teléfono Celular (10 dígitos y empieza por 09)
    $.validator.addMethod("telefonoCelularEcuador", function(value, element) {
        return this.optional(element) || /^09\d{8}$/.test(value);
    }, "El teléfono debe tener 10 dígitos y empezar estrictamente con '09'.");

    // 3. Validación lógica de Nombre
    $.validator.addMethod("nombreLogico", function(value, element) {
        if (this.optional(element)) return true;
        var soloLetras = /^[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+$/.test(value);
        return soloLetras && value.trim().length >= 3;
    }, "Ingrese un nombre válido (solo letras y espacios, mínimo 3 caracteres).");

    // 4. Validación lógica de Dirección
    $.validator.addMethod("direccionLogica", function(value, element) {
        if (this.optional(element)) return true;
        var tieneLetras = /[a-zA-ZáéíóúÁÉÍÓÚñÑ]/.test(value);
        return tieneLetras && value.trim().length >= 6;
    }, "Ingrese una dirección válida (debe incluir nombres de calles o avenidas).");

    // 5. Oficinas origen y destino distintas
    $.validator.addMethod("distintoOrigen", function(value, element) {
        var origen = $('#oficina_origen').val();
        return value !== origen;
    }, "La oficina de destino no puede ser la misma que la de origen.");

    // 6. Validación de capacidad de transporte
    $.validator.addMethod("validaCapacidad", function(value, element) {
        var idTransporte = $('#transporte').val();
        if (!idTransporte) return true;
        var capacidadMax = $('#transporte option:selected').data('capacidad');
        return parseFloat(value) <= parseFloat(capacidadMax);
    }, "El peso supera la capacidad máxima del transporte seleccionado.");

    // 7. Configuración de reglas y mensajes con todo en español
    $("#formEncomienda").validate({
        rules: {
            cliente: {
                required: true
            },
            oficina_origen: {
                required: true
            },
            oficina_destino: {
                required: true,
                distintoOrigen: true
            },
            nombre_destinatario: {
                required: true,
                nombreLogico: true
            },
            cedula_destinatario: {
                required: true,
                cedulaEcuador: true
            },
            telefono_destinatario: {
                required: true,
                telefonoCelularEcuador: true
            },
            email_destinatario: {
                email: "Ingrese un correo electrónico válido."
            },
            direccion_destino: {
                required: true,
                direccionLogica: true
            },
            descripcion: {
                required: true,
                minlength: 5
            },
            peso_kg: {
                required: true,
                number: true,
                min: 0.1,
                max: 500
            },
            costo_envio: {
                required: true,
                number: true,
                min: 0,
                max: 500
            },
            valor_declarado: {
                required: true,
                number: true,
                min: 0,
                max: 10000
            }
        },
        messages: {
            cliente: {
                required: "Por favor, seleccione un cliente remitente."
            },
            oficina_origen: {
                required: "Por favor, seleccione la oficina de origen."
            },
            oficina_destino: {
                required: "Por favor, seleccione la oficina de destino."
            },
            nombre_destinatario: {
                required: "Por favor, ingrese el nombre del destinatario."
            },
            cedula_destinatario: {
                required: "Por favor, ingrese la cédula del destinatario."
            },
            telefono_destinatario: {
                required: "Por favor, ingrese el teléfono de contacto."
            },
            direccion_destino: {
                required: "Por favor, ingrese la dirección de entrega."
            },
            descripcion: {
                required: "Por favor, describa el contenido del paquete.",
                minlength: "La descripción debe tener al menos 5 caracteres."
            },
            peso_kg: {
                required: "Por favor, ingrese el peso del paquete.",
                number: "Ingrese un valor numérico válido.",
                min: "El peso debe ser mayor a 0.",
                max: "El peso no puede exceder los 500 kg."
            },
            costo_envio: {
                required: "Por favor, ingrese el costo del envío.",
                number: "Ingrese un valor numérico válido.",
                min: "El costo no puede ser negativo.",
                max: "El costo no puede superar los $500.00."
            },
            valor_declarado: {
                required: "Por favor, ingrese el valor declarado.",
                number: "Ingrese un valor numérico válido.",
                min: "El valor no puede ser negativo.",
                max: "El valor no puede superar los $10,000.00."
            }
        },
        errorElement: 'span',
        errorPlacement: function (error, element) {
            error.addClass('invalid-feedback');
            element.closest('div').append(error);
        },
        highlight: function (element, errorClass, validClass) {
            $(element).addClass('is-invalid').removeClass('is-valid');
        },
        unhighlight: function (element, errorClass, validClass) {
            $(element).removeClass('is-invalid').addClass('is-valid');
        }
    });

    // Re-validar peso si se cambia el transporte
    $('#transporte').on('change', function() {
        if ($('#peso_kg').val() !== "") {
            $('#peso_kg').valid();
        }
    });
});
</script>
{% endblock %}
