{% extends "plantillaprincipal.html" %}
{% block titulo %}Nuevo transporte | Punto a Punto{% endblock %}

{% block contenido %}
<main class="main" style="padding-top: 105px;">
<section class="section">
<div class="container">

<div class="row justify-content-center">
    <div class="col-lg-9">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="bi bi-truck"></i> Registrar transporte</h4>
            </div>
            <div class="card-body p-4">
                <!-- Se agrega novalidate para que jQuery Validate tome el control -->
                <form id="formTransporte" action="/transportes/guardarTransporte/" method="post" novalidate>
                    {% csrf_token %}
                    <div class="row g-3">
                        
                        <!-- Placa -->
                        <div class="col-md-3">
                            <label class="form-label font-weight-bold">Placa <span class="text-danger">*</span></label>
                            <input type="text" 
                                   id="placa" 
                                   name="placa" 
                                   class="form-control text-uppercase" 
                                   placeholder="Ej: ABC-1234" 
                                   maxlength="8">
                        </div>

                        <!-- Tipo -->
                        <div class="col-md-3">
                            <label class="form-label font-weight-bold">Tipo <span class="text-danger">*</span></label>
                            <select name="tipo" class="form-select">
                                <option value="">Seleccione...</option>
                                {% for valor, texto in tipos_transporte %}
                                <option value="{{ valor }}">{{ texto }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <!-- Marca -->
                        <div class="col-md-3">
                            <label class="form-label font-weight-bold">Marca <span class="text-danger">*</span></label>
                            <input type="text" 
                                   name="marca" 
                                   class="form-control" 
                                   placeholder="Ej: Chevrolet" 
                                   maxlength="30">
                        </div>

                        <!-- Modelo -->
                        <div class="col-md-3">
                            <label class="form-label font-weight-bold">Modelo <span class="text-danger">*</span></label>
                            <input type="text" 
                                   name="modelo" 
                                   class="form-control" 
                                   placeholder="Ej: D-Max 2023" 
                                   maxlength="30">
                        </div>

                        <!-- Capacidad -->
                        <div class="col-md-6">
                            <label class="form-label font-weight-bold">Capacidad (kg) <span class="text-danger">*</span></label>
                            <input type="number" 
                                   name="capacidad_kg" 
                                   step="0.01" 
                                   class="form-control" 
                                   placeholder="Ej: 500.00">
                        </div>

                        <!-- Estado -->
                        <div class="col-md-6">
                            <label class="form-label font-weight-bold">Estado <span class="text-danger">*</span></label>
                            <select name="estado" class="form-select">
                                {% for valor, texto in estados_transporte %}
                                <option value="{{ valor }}">{{ texto }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <!-- Botones de Acción -->
                    <div class="mt-4 d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save"></i> Guardar
                        </button>
                        <a href="/transportes/listadoTransporte/" class="btn btn-secondary">
                            Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

</div>
</section>
</main>

<script>
$(document).ready(function() {

    // Placa automáticamente a Mayúsculas
    $('#placa').on('input', function() {
        this.value = this.value.toUpperCase().replace(/[^A-Z0-9-]/g, '');
    });

    // Validaciones
    $.validator.addMethod("formatoPlaca", function(value, element) {
        return this.optional(element) || /^[A-Z]{3}-\d{3,4}$|^[A-Z]{1,3}\d{3,4}$/.test(value);
    }, "Ingrese una placa válida (Ej: PBX-1234).");

    $.validator.addMethod("soloTexto", function(value, element) {
        return this.optional(element) || /^[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+$/.test(value);
    }, "Solo se permiten letras.");

    $("#formTransporte").validate({
        rules: {
            placa: {
                required: true,
                minlength: 6,
                formatoPlaca: true
            },
            tipo: {
                required: true
            },
            marca: {
                required: true,
                minlength: 2,
                soloTexto: true
            },
            modelo: {
                required: true,
                minlength: 1
            },
            capacidad_kg: {
                required: true,
                number: true,
                min: 0.1,
                max: 50000
            },
            estado: {
                required: true
            }
        },
        messages: {
            placa: {
                required: "La placa es obligatoria.",
                minlength: "La placa debe tener al menos 6 caracteres."
            },
            tipo: "Seleccione un tipo de vehículo.",
            marca: {
                required: "La marca es obligatoria.",
                minlength: "La marca debe tener al menos 2 letras."
            },
            modelo: "El modelo es obligatorio.",
            capacidad_kg: {
                required: "La capacidad es obligatoria.",
                number: "Ingrese un número válido.",
                min: "La capacidad debe ser mayor a 0 kg.",
                max: "Capacidad máxima 50,000 kg."
            },
            estado: "Seleccione un estado."
        }
    });

});
</script>
{% endblock %}
