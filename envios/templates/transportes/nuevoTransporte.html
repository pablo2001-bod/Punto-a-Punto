{% extends "plantillaprincipal.html" %}
{% block titulo %}Nuevo transporte | Punto a Punto{% endblock %}

{% block contenido %}
<main class="main" style="padding-top: 105px;">
<section class="section">
<div class="container">

<div class="row justify-content-center">
    <div class="col-lg-9">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="bi bi-truck"></i> Registrar transporte</h4>
            </div>
            <div class="card-body p-4">
                <!-- Se le agrega un id="formTransporte" para manipularlo y validarlo con JS -->
                <form id="formTransporte" action="/transportes/guardarTransporte/" method="post">
                    {% csrf_token %}
                    <div class="row g-3">
                        
                        <!-- Campo PLACA: Convertida a mayúsculas automáticamente, longitud limitada y patrón de placa (Ej: ABC-1234) -->
                        <div class="col-md-3">
                            <label class="form-label font-weight-bold">Placa <span class="text-danger">*</span></label>
                            <input type="text" 
                                   id="placa" 
                                   name="placa" 
                                   class="form-control text-uppercase" 
                                   placeholder="Ej: ABC-1234" 
                                   maxlength="8" 
                                   required>
                        </div>

                        <!-- Campo TIPO: Obliga a elegir una opción válida -->
                        <div class="col-md-3">
                            <label class="form-label font-weight-bold">Tipo <span class="text-danger">*</span></label>
                            <select name="tipo" class="form-select" required>
                                <option value="">Seleccione...</option>
                                {% for valor, texto in tipos_transporte %}
                                <option value="{{ valor }}">{{ texto }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <!-- Campo MARCA: Solo letras y espacios, mínimo 2 caracteres -->
                        <div class="col-md-3">
                            <label class="form-label font-weight-bold">Marca <span class="text-danger">*</span></label>
                            <input type="text" 
                                   name="marca" 
                                   class="form-control" 
                                   placeholder="Ej: Chevrolet" 
                                   maxlength="30" 
                                   required>
                        </div>

                        <!-- Campo MODELO: Letras, números y espacios -->
                        <div class="col-md-3">
                            <label class="form-label font-weight-bold">Modelo <span class="text-danger">*</span></label>
                            <input type="text" 
                                   name="modelo" 
                                   class="form-control" 
                                   placeholder="Ej: D-Max 2023" 
                                   maxlength="30" 
                                   required>
                        </div>

                        <!-- Campo CAPACIDAD: Solo números positivos entre 0.1 y 50,000 kg -->
                        <div class="col-md-6">
                            <label class="form-label font-weight-bold">Capacidad (kg) <span class="text-danger">*</span></label>
                            <input type="number" 
                                   name="capacidad_kg" 
                                   step="0.01" 
                                   min="0.1" 
                                   max="50000" 
                                   class="form-control" 
                                   placeholder="Ej: 500.00" 
                                   required>
                        </div>

                        <!-- Campo ESTADO: Selección directa -->
                        <div class="col-md-6">
                            <label class="form-label font-weight-bold">Estado <span class="text-danger">*</span></label>
                            <select name="estado" class="form-select" required>
                                {% for valor, texto in estados_transporte %}
                                <option value="{{ valor }}">{{ texto }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <!-- Botones de Acción -->
                    <div class="mt-4 d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save"></i> Guardar
                        </button>
                        <a href="/transportes/listadoTransporte/" class="btn btn-secondary">
                            Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

</div>
</section>
</main>

<!-- SCRIPTS DE VALIDACIÓN (jQuery + jQuery Validate) -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.min.js"></script>

<script>
$(document.ready(function() {

    // =========================================================
    // 1. TRANSFORMACIÓN EN TIEMPO REAL: Placa en Mayúsculas
    // =========================================================
    $('#placa').on('input', function() {
        this.value = this.value.toUpperCase().replace(/[^A-Z0-9-]/g, '');
    });



    // Regla para Placas de Ecuador (Ejemplos válidos: PBA-1234, PB-123, P-123456)
    $.validator.addMethod("formatoPlaca", function(value, element) {
        return this.optional(element) || /^[A-Z]{3}-\d{3,4}$|^[A-Z]{1,3}\d{3,4}$/.test(value);
    }, "Ingrese una placa válida (Ej: PBX-1234 o ABC1234).");

    // Regla para Texto Solo Letras y Espacios (Marcas reales)
    $.validator.addMethod("soloTexto", function(value, element) {
        return this.optional(element) || /^[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+$/.test(value);
    }, "Este campo solo puede contener letras.");

    // Regla para Modelo (Letras, números, guiones y espacios)
    $.validator.addMethod("formatoModelo", function(value, element) {
        return this.optional(element) || /^[a-zA-Z0-9áéíóúÁÉÍÓÚñÑ\s-]+$/.test(value);
    }, "El modelo contiene caracteres no válidos.");


    // =========================================================
    // 3. CONFIGURACIÓN DEL VALIDADOR EN EL FORMULARIO
    // =========================================================
    $("#formTransporte").validate({
        // Reglas específicas por el atributo 'name' de cada input
        rules: {
            placa: {
                required: true,
                minlength: 6,
                maxlength: 8,
                formatoPlaca: true
            },
            tipo: {
                required: true
            },
            marca: {
                required: true,
                minlength: 2,
                soloTexto: true
            },
            modelo: {
                required: true,
                minlength: 1,
                formatoModelo: true
            },
            capacidad_kg: {
                required: true,
                number: true,
                min: 0.1,
                max: 50000
            },
            estado: {
                required: true
            }
        },
        
        // Mensajes personalizados de error
        messages: {
            placa: {
                required: "La placa es obligatoria.",
                minlength: "La placa debe tener al menos 6 caracteres."
            },
            tipo: {
                required: "Por favor seleccione un tipo de vehículo."
            },
            marca: {
                required: "La marca es obligatoria.",
                minlength: "La marca debe tener al menos 2 letras."
            },
            modelo: {
                required: "El modelo es obligatorio."
            },
            capacidad_kg: {
                required: "La capacidad en kg es obligatoria.",
                number: "Ingrese un número válido.",
                min: "La capacidad debe ser mayor a 0 kg.",
                max: "Capacidad excesiva (máximo 50,000 kg)."
            },
            estado: {
                required: "Seleccione un estado."
            }
        },

        // Estilos Bootstrap para marcar errores en rojo
        errorElement: 'span',
        errorPlacement: function (error, element) {
            error.addClass('invalid-feedback');
            element.closest('.col-md-3, .col-md-6').append(error);
        },
        highlight: function (element, errorClass, validClass) {
            $(element).addClass('is-invalid').removeClass('is-valid');
        },
        unhighlight: function (element, errorClass, validClass) {
            $(element).removeClass('is-invalid').addClass('is-valid');
        }
    });

});
</script>
{% endblock %}
