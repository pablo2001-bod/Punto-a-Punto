{% extends "plantillaprincipal.html" %}
{% block contenido %}
<main class="main" style="padding-top: 105px;">
<section class="section">
<div class="container">

<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">
                    <i class="bi bi-exclamation-triangle"></i>
                    Registrar novedad
                </h4>
            </div>
            <div class="card-body p-4">
                <p>
                    <strong>Encomienda:</strong>
                    {{ encomienda.codigo_seguimiento }}
                </p>

                <form action="/reportes/guardarReporte/" method="post">
                    {% csrf_token %}
                    <input type="hidden" name="encomienda"
                           value="{{ encomienda.id_encomienda }}">

                    <div class="mb-3">
                        <label class="form-label">Tipo de reporte</label>
                        <select name="tipo" class="form-select" required>
                            <option value="">Seleccione</option>
                            {% for valor, texto in tipos_reporte %}
                            <option value="{{ valor }}">{{ texto }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Detalle</label>
                        <textarea name="detalle" rows="5"
                                  class="form-control" required></textarea>
                    </div>

                    <div class="form-check mb-4">
                        <input type="checkbox" name="resuelto"
                               class="form-check-input" id="resuelto">
                        <label class="form-check-label" for="resuelto">
                            Marcar como resuelto
                        </label>
                    </div>

                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-save"></i> Guardar reporte
                    </button>
                    <a href="/encomiendas/detalleEncomienda/{{ encomienda.id_encomienda }}"
                       class="btn btn-secondary">
                        Cancelar
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>

</div>
</section>
</main>
{% endblock %}
